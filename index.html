<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English with Fun — Головна</title>
    
    <!-- Підключення зовнішніх бібліотек -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Підключення власного CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
    <h1><i class="fas fa-cloud-sun" style="color:#ffb703;"></i> English with Fun</h1>
    <p>📚 Інтерактивна граматика для 2-5 класів НУШ</p>
</div>

<!-- фільтри -->
<div class="filter-section">
    <button class="filter-btn active" data-filter="all"><i class="fas fa-star"></i> Усі вправи</button>
    <button class="filter-btn" data-filter="grade2"><i class="fas fa-smile"></i> 2 клас</button>
    <button class="filter-btn" data-filter="grade3"><i class="fas fa-dragon"></i> 3 клас</button>
    <button class="filter-btn" data-filter="grade5"><i class="fas fa-rocket"></i> 5 клас</button>
    <button class="filter-btn" data-filter="waswere"><i class="fas fa-dragon"></i> Was/Were</button>
    <button class="filter-btn" data-filter="past"><i class="fas fa-clock"></i> Past Simple</button>
    <button class="filter-btn" data-filter="present"><i class="fas fa-heart"></i> Present</button>
    <button class="filter-btn refresh-btn" onclick="refreshFiles()"><i class="fas fa-sync-alt"></i> Оновити</button>
</div>

<!-- сітка карток -->
<div class="cards-grid" id="cardsContainer">
    <!-- Картки будуть додані автоматично через JavaScript -->
</div>

<!-- підвал -->
<div class="footer-info">
    <i class="fas fa-link"></i> Усі файли лежать у папці <code>./Eng_template_files/</code> <br>
    <span class="emoji-big"><a href="./easter_eggs/index.html" target="_blank" style="text-decoration: none;">😎</a> Клікай на картки — вони відкриються в новій вкладці!</span>
    <div id="lastUpdate" class="mt-2" style="font-size:0.8rem; color:var(--muted)"></div>
</div>

<!-- Підключення Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Підключення власного JS -->
<script src="script.js"></script>
</body>
</html>
